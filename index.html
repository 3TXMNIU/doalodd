<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>تحميل الفيديو</title>
  
  <!-- ملفات PWA للتثبيت -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .container {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 30px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    h1 {
      text-align: center;
      color: #fff;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    .sub {
      text-align: center;
      color: #aaa;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .status {
      background: #0f0f1a;
      border-radius: 50px;
      padding: 12px 20px;
      margin-bottom: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #2a2a3e;
    }
    
    .status span:first-child {
      color: #4ade80;
      font-weight: bold;
    }
    
    .status span:last-child {
      color: #fff;
      font-size: 14px;
    }
    
    .youtube-link {
      background: #ff0000;
      border-radius: 50px;
      padding: 14px 20px;
      margin-bottom: 25px;
      text-align: center;
      transition: transform 0.3s;
    }
    
    .youtube-link a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      display: block;
    }
    
    .youtube-link:hover {
      transform: scale(1.02);
    }
    
    .input-section {
      margin-bottom: 25px;
    }
    
    .input-section label {
      color: #ccc;
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }
    
    .url-input {
      width: 100%;
      padding: 15px;
      border-radius: 15px;
      border: none;
      background: #0f0f1a;
      color: white;
      font-size: 14px;
      margin-bottom: 10px;
      border: 1px solid #2a2a3e;
    }
    
    .button-group {
      display: flex;
      gap: 10px;
    }
    
    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
    }
    
    .btn-primary {
      background: #3b82f6;
      color: white;
    }
    
    .btn-primary:hover {
      background: #2563eb;
    }
    
    .btn-secondary {
      background: #334155;
      color: white;
    }
    
    .btn-secondary:hover {
      background: #475569;
    }
    
    .quality-section {
      margin: 25px 0;
    }
    
    .quality-title {
      color: #ccc;
      margin-bottom: 12px;
      font-size: 14px;
    }
    
    .quality-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    
    .quality-btn {
      padding: 12px;
      background: #0f0f1a;
      border: 1px solid #2a2a3e;
      border-radius: 15px;
      color: white;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }
    
    .quality-btn.selected {
      background: #3b82f6;
      border-color: #3b82f6;
    }
    
    .download-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #4ade80, #22c55e);
      border: none;
      border-radius: 50px;
      color: #1a1a2e;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.3s;
      margin-top: 10px;
    }
    
    .download-btn:hover {
      transform: scale(1.02);
    }
    
    .error {
      color: #f87171;
      text-align: center;
      margin-top: 15px;
      font-size: 13px;
    }
    
    footer {
      text-align: center;
      margin-top: 25px;
      color: #555;
      font-size: 12px;
    }
    
    .install-btn {
      background: #8b5cf6;
      margin-top: 15px;
      display: none;
    }
    
    @media (max-width: 480px) {
      .container {
        padding: 20px;
      }
      .quality-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>📥 يلا سوزك</h1>
  <div class="sub">تحميل الفيديو من الرابط</div>
  
  <div class="status">
    <span>🟢 متصل</span>
    <span>الرابط: يوتيوب</span>
  </div>
  
  <div class="youtube-link">
    <a href="https://www.youtube.com/watch?v=U78wdxeYxEA&si=u_gwzH9_O70lZIGD" target="_blank">🎬 رابط ويتوب ▶</a>
  </div>
  
  <div class="input-section">
    <label>📎 رابط الفيديو</label>
    <input type="text" class="url-input" id="videoUrl" placeholder="الصق الرابط هنا...">
    <div class="button-group">
      <button class="btn btn-primary" id="pasteBtn">📋 لصق</button>
      <button class="btn btn-secondary" id="scanBtn">📷 مسح</button>
    </div>
  </div>
  
  <div class="quality-section">
    <div class="quality-title">🎬 اختر الجودة المطلوبة</div>
    <div class="quality-grid" id="qualityGrid">
      <div class="quality-btn" data-quality="normal">فيديو عادي</div>
      <div class="quality-btn" data-quality="hd">🎥 HD فيديو</div>
      <div class="quality-btn" data-quality="small">📦 حجم صغير</div>
      <div class="quality-btn" data-quality="audio">🎵 صوت فقط</div>
    </div>
  </div>
  
  <button class="download-btn" id="downloadBtn">⬇ تحميل</button>
  <div class="error" id="errorMsg"></div>
  <footer>تحقق من الاتصال بالإنترنت</footer>
</div>

<script>
  // Service Worker للتثبيت
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
      .then(() => console.log('✅ Service Worker ثبت'))
      .catch(err => console.log('❌ خطأ:', err));
  }
  
  // متغيرات
  let selectedQuality = 'normal';
  let deferredPrompt;
  
  // اختيار الجودة
  document.querySelectorAll('.quality-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('selected'));
      this.classList.add('selected');
      selectedQuality = this.dataset.quality;
    });
  });
  // تحديد الافتراضي
  document.querySelector('.quality-btn').classList.add('selected');
  
  // زر اللصق
  document.getElementById('pasteBtn').addEventListener('click', async () => {
    try {
      const text = await navigator.clipboard.readText();
      document.getElementById('videoUrl').value = text;
      document.getElementById('errorMsg').innerHTML = '✅ تم لصق الرابط';
      setTimeout(() => document.getElementById('errorMsg').innerHTML = '', 2000);
    } catch(e) {
      document.getElementById('errorMsg').innerHTML = '❌ لا يمكن الوصول للحافظة';
    }
  });
  
  // زر المسح (محاكاة)
  document.getElementById('scanBtn').addEventListener('click', () => {
    document.getElementById('errorMsg').innerHTML = '📷 ميزة المسح قريباً';
    setTimeout(() => document.getElementById('errorMsg').innerHTML = '', 2000);
  });
  
  // زر التحميل
  document.getElementById('downloadBtn').addEventListener('click', () => {
    const url = document.getElementById('videoUrl').value;
    if (!url) {
      document.getElementById('errorMsg').innerHTML = '❌ الرجاء لصق الرابط أولاً';
      return;
    }
    if (!url.includes('youtube.com') && !url.includes('youtu.be')) {
      document.getElementById('errorMsg').innerHTML = '⚠ الرجاء إدخال رابط يوتيوب صحيح';
      return;
    }
    
    let downloadUrl = '';
    switch(selectedQuality) {
      case 'normal':
        downloadUrl = 'https://example.com/download/normal';
        break;
      case 'hd':
        downloadUrl = 'https://example.com/download/hd';
        break;
      case 'small':
        downloadUrl = 'https://example.com/download/small';
        break;
      case 'audio':
        downloadUrl = 'https://example.com/download/audio';
        break;
    }
    
    document.getElementById('errorMsg').innerHTML = '🔄 جاري التحميل...';
    
    setTimeout(() => {
      document.getElementById('errorMsg').innerHTML = '⚠ رابط تجريبي - استبدله بـ API حقيقي';
    }, 1500);
    
    // window.open(downloadUrl, '_blank'); // فعل هذا عندما يكون لديك API حقيقي
  });
  
  // إظهار زر التثبيت إذا كان PWA مدعوم
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const installBtn = document.createElement('button');
    installBtn.textContent = '📲 تثبيت التطبيق';
    installBtn.className = 'download-btn install-btn';
    installBtn.style.display = 'block';
    installBtn.style.background = '#8b5cf6';
    document.querySelector('.container').appendChild(installBtn);
    
    installBtn.addEventListener('click', () => {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        installBtn.style.display = 'none';
      });
    });
  });
</script>
</body>
</html>
